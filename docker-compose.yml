services:
  fewo-website:
    image: ghcr.io/larswillrich/fewo-willrich:latest
    container_name: fewo-website
    restart: unless-stopped
    labels:
      - traefik.enable=true
      # Main router for fewo-willrich.de
      - traefik.http.routers.fewo.rule=Host(`fewo-willrich.de`)
      - traefik.http.routers.fewo.tls=true
      - traefik.http.routers.fewo.entrypoints=web,websecure
      - traefik.http.routers.fewo.tls.certresolver=mytlschallenge
      - traefik.http.services.fewo.loadbalancer.server.port=80
      # WWW redirect: www.fewo-willrich.de -> fewo-willrich.de
      - traefik.http.routers.fewo-www.rule=Host(`www.fewo-willrich.de`)
      - traefik.http.routers.fewo-www.tls=true
      - traefik.http.routers.fewo-www.entrypoints=web,websecure
      - traefik.http.routers.fewo-www.tls.certresolver=mytlschallenge
      - traefik.http.routers.fewo-www.middlewares=fewo-www-redirect
      - traefik.http.middlewares.fewo-www-redirect.redirectregex.regex=^https?://www\.fewo-willrich\.de/(.*)
      - traefik.http.middlewares.fewo-www-redirect.redirectregex.replacement=https://fewo-willrich.de/$${1}
      - traefik.http.middlewares.fewo-www-redirect.redirectregex.permanent=true
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
